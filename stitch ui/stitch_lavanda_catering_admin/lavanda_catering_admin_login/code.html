<body class="min-h-screen flex items-center justify-center p-sm md:p-md h-screen w-screen bg-surface">
<!-- Login Card -->
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-[12px] p-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.12)] border border-border-light relative overflow-hidden">
<!-- Header -->
<div class="text-center mb-[32px] flex flex-col items-center">
<!-- Brand Logo / Identity Placeholder -->
<div class="w-16 h-16 bg-surface-container-low rounded-full mb-sm flex items-center justify-center overflow-hidden border border-border-light">
<img alt="Lavanda Catering Logo" class="w-full h-full object-cover" data-alt="A minimalist and elegant catering company logo featuring a stylized sprig of lavender in muted greens and purples. The design is clean, organic, and professional, set against a pure white background to convey freshness and high quality. The aesthetic is modern corporate identity suitable for a high-end food service brand." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6gvhKfvaVygx-xlKr89qT-TyBWRdtSon3NnfcDG7Ddw7E05Y0tClxQ00gvwspy7tMC_WcG7tTKK-RlXjSewLIL4asQydpUmhm96NJqMbh3BpcVybdskfQX8c6VmI7dYYD4zXFEYv_sEeNsYquKPeUg4hqeKFt6HYCjtfc38Pw0kpW6oooRzDw_jxdV2sir9nJ_SfwHZMS08YuYHwF88BC8ubs1gCqHPyltGFG1ieV9ykqFAwFwg2Z4078y3gEJ27vBEn3ynEnvR9g">
</div>
<h2 class="font-section-h2 text-section-h2 text-primary mb-xs">Admin Login</h2>
<p class="font-caption text-caption text-text-muted">Lavanda Catering Management System</p>
</div>
<!-- Error Banner (Conditional State Simulation) -->
<div class="bg-error-container border border-danger text-danger font-body-sm text-body-sm rounded-lg p-sm mb-[24px] flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">error</span>
            Email atau kata sandi salah.
        </div>
<!-- Form -->
<form action="#" class="flex flex-col gap-[20px]" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted">mail</span>
</div>
<input class="w-full h-[48px] pl-10 pr-4 bg-surface-container-lowest border border-border-light rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-shadow" id="email" name="email" placeholder="admin@lavandacatering.id" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Kata Sandi</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted">lock</span>
</div>
<input class="w-full h-[48px] pl-10 pr-12 bg-surface-container-lowest border border-border-light rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-muted hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link Optional -->
<div class="flex justify-end mt-1">
<a class="font-caption text-caption text-primary hover:underline" href="#">Lupa kata sandi?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[48px] bg-gradient-to-r from-primary to-primary-container text-on-primary font-label-bold text-label-bold rounded-lg shadow-sm hover:opacity-90 active:scale-95 transition-all mt-xs flex justify-center items-center" type="submit">
                Masuk
            </button>
</form>
<!-- Subtle Security Note -->
<div class="mt-[32px] text-center flex items-center justify-center gap-2 text-text-muted font-caption text-caption">
<span class="material-symbols-outlined text-[14px]">shield_lock</span>
            Secure Admin Portal
        </div>
</div>




</body></html>
